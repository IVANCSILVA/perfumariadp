<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decent Privé | Sistema de Gestão</title>
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'loja/images/favicon.png' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .bg-aura {
            background:
                radial-gradient(ellipse 60% 50% at 50% 0%, rgba(217,161,79,0.10), transparent 70%),
                radial-gradient(ellipse 60% 50% at 50% 100%, rgba(120,53,15,0.18), transparent 70%),
                #0c0a09;
        }
        .logo-dourado { height: 80px; width: auto; margin: 0 auto; display: block; filter: drop-shadow(0 0 16px rgba(217, 161, 79, 0.45)); }
    </style>
</head>
<body class="bg-aura min-h-screen flex items-center justify-center px-4 py-8">
    {% load static %}
    <div class="w-full max-w-sm">
        <div class="bg-stone-800/80 backdrop-blur border border-amber-600/40 rounded-2xl shadow-2xl shadow-black/50 ring-1 ring-amber-500/10 overflow-hidden">
            <div class="text-center px-8 pt-7 pb-5 border-b border-stone-700/60">
                <img src="{% static 'loja/images/logo2.png' %}" alt="Decent Privé" class="logo-dourado">
                <p class="text-amber-400 text-[10px] uppercase tracking-[0.4em] mt-2">E-mail enviado</p>
            </div>
            <div class="px-8 py-8 text-center">
                <div class="w-14 h-14 mx-auto bg-emerald-900/40 border border-emerald-600/50 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-7 h-7 text-emerald-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <p class="text-stone-200 text-sm mb-2">Link enviado com sucesso!</p>
                <p class="text-stone-400 text-xs leading-relaxed">
                    Se o e-mail indicado existir na nossa base de dados, receberá em instantes uma mensagem com instruções para definir uma nova senha.
                </p>
                <p class="text-stone-500 text-[11px] mt-4">Verifique também a pasta de Spam.</p>
                <a href="{% url 'gestao_login' %}" class="inline-block mt-6 text-[10px] uppercase tracking-[0.35em] text-amber-400 hover:text-amber-300 transition-colors">
                    Voltar ao login →
                </a>
            </div>
        </div>
    </div>
</body>
</html>
