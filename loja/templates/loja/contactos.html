<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decent Prive | Contactos</title>
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'loja/images/favicon.png' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-white text-gray-900">
    {% load static %}
    <!-- Navbar -->
    <nav class="flex justify-between items-start px-8 pt-2 pb-0 border-b border-stone-200 bg-stone-50">
        <a href="{% url 'home' %}" class="-mt-16">
            <img src="{% static 'loja/images/logo2.png' %}" alt="Decent Prive" class="h-56 w-auto">
        </a>
        <div class="space-x-8 text-xs uppercase tracking-widest hidden md:flex pt-4">
            <a href="{% url 'home' %}" class="text-amber-800 px-3 py-1 hover:drop-shadow transition-all duration-200">Página Inicial</a>
            <a href="{% url 'colecoes' %}" class="text-amber-800 px-3 py-1 hover:drop-shadow transition-all duration-200">Colecções</a>
            <a href="{% url 'encomendas' %}" class="text-amber-800 px-3 py-1 hover:drop-shadow transition-all duration-200">Encomendas</a>
            <a href="{% url 'fidelidade' %}" class="text-amber-800 px-3 py-1 hover:drop-shadow transition-all duration-200">Fidelidade</a>
        </div>
    </nav>

    <main class="px-8 py-16 text-center">
        <h1 class="text-5xl font-serif italic mb-6">Contactos</h1>
        <p class="text-gray-500 max-w-md mx-auto tracking-wide uppercase text-xs">Entre em contacto connosco para qualquer informação.</p>
    </main>
</body>
</html>
